<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderneta — Dívidas Mensais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ECEFF1;
  --card:#FFFFFF;
  --ink:#16241F;
  --ink-soft:#5A6B64;
  --ledger:#0B5C46;
  --ledger-soft:#E1EEE9;
  --debt:#C0392B;
  --debt-soft:#FAEAE8;
  --gold:#B98A2F;
  --line:#D5DBD8;
  --radius:10px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Archivo',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:inherit;color:inherit}
:focus-visible{outline:2px solid var(--ledger);outline-offset:2px}

/* ===== Header ===== */
header{background:var(--ledger);color:#F2F7F5;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
header h1{font-size:17px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;font-stretch:90%;display:flex;align-items:center;gap:8px;}
header h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);display:inline-block}
.hdr-actions{display:flex;gap:6px}
.hdr-btn{font-size:12px;font-weight:600;padding:7px 11px;border-radius:7px;background:rgba(255,255,255,.13);color:#fff;}
.hdr-btn:hover{background:rgba(255,255,255,.24)}

/* ===== Resumo ===== */
.summary{background:var(--ledger);color:#fff;padding:4px 18px 20px;}
.sobra-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.sobra{font-family:var(--mono);font-size:42px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums;transition:color .3s;}
.sobra.neg{color:#FFB3A7}
.sobra.pos{color:#A8E6C9}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.mini{background:rgba(255,255,255,.09);border-radius:8px;padding:9px 11px;}
.mini .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.mini .v{font-family:var(--mono);font-size:15px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.payprog{margin-top:14px}
.payprog .ptop{display:flex;justify-content:space-between;font-size:11px;opacity:.85;margin-bottom:5px}
.pbar{height:8px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden}
.pbar > div{height:100%;background:var(--gold);border-radius:99px;width:0;transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* ===== Corpo ===== */
main{flex:1;overflow-y:auto;padding:16px 14px 110px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input[type=search]{flex:1;min-width:140px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-size:14px;}
.toolbar select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-size:13px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);margin:18px 2px 8px;display:flex;justify-content:space-between;align-items:baseline;}
.section-title .sub{font-family:var(--mono);font-size:12px;color:var(--debt)}

/* cartão de dívida */
.debt{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px;transition:opacity .25s,transform .15s;}
.debt.paid{opacity:.55}
.debt.paid .dval{text-decoration:line-through}
.chk{width:24px;height:24px;min-width:24px;border:2px solid var(--ledger);border-radius:7px;display:flex;align-items:center;justify-content:center;background:#fff;transition:background .15s;}
.chk.on{background:var(--ledger)}
.chk svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .15s}
.chk.on svg{opacity:1}
.dinfo{flex:1;min-width:0}
.dname{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dmeta{font-size:11.5px;color:var(--ink-soft);display:flex;gap:7px;align-items:center;margin-top:2px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:99px;background:var(--ledger-soft);color:var(--ledger);}
.tag.rec{background:#FDF3E0;color:var(--gold)}
.tag.prazo{background:#E3F2FD;color:#1565C0}
.dval{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--debt);font-variant-numeric:tabular-nums;white-space:nowrap}
.dmenu{padding:6px;color:var(--ink-soft);border-radius:6px}
.dmenu:hover{background:var(--paper)}
.empty{text-align:center;padding:48px 20px;color:var(--ink-soft);}
.empty .big{font-size:38px;margin-bottom:10px}
.empty p{font-size:14px;max-width:260px;margin:0 auto;line-height:1.5}

/* gráfico por categoria */
.chart{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.crow:last-child{margin-bottom:0}
.clabel{width:86px;font-size:11.5px;font-weight:600;color:var(--ink-soft);text-align:right}
.cbarwrap{flex:1;height:16px;background:var(--paper);border-radius:5px;overflow:hidden}
.cbar{height:100%;background:var(--ledger);border-radius:5px;width:0;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.cval{font-family:var(--mono);font-size:11.5px;width:80px;font-variant-numeric:tabular-nums}

/* ===== Dashboard ===== */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.dash-stat{background:var(--paper);border-radius:9px;padding:13px 14px}
.dash-stat .k{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
.dash-stat .v{font-family:var(--mono);font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.dash-stat .v.pos{color:var(--ledger)}
.dash-stat .v.neg{color:var(--debt)}
.dash-stat .vsub{font-size:10px;color:var(--ink-soft);margin-top:3px}
.dash-sub{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 8px}
.dmr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--paper);border-radius:0}
.dmr:first-child{border-radius:10px 10px 0 0}
.dmr:last-child{border-bottom:none;border-radius:0 0 10px 10px}
.dmr-left{flex:1;min-width:0}
.dmr-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dmr-name.cur{color:var(--ledger)}
.dmr-badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:99px;background:var(--ledger);color:#fff;flex-shrink:0}
.dmr-bar{height:3px;background:var(--line);border-radius:2px;margin-top:5px;overflow:hidden}
.dmr-barfill{height:100%;border-radius:2px;background:var(--debt);width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.dmr-right{text-align:right;min-width:84px;flex-shrink:0}
.dmr-total{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--debt);font-variant-numeric:tabular-nums}
.dmr-sobra{font-family:var(--mono);font-size:10.5px;margin-top:2px;font-variant-numeric:tabular-nums}
.dmr-sobra.pos{color:var(--ledger)}
.dmr-sobra.neg{color:var(--debt)}
.inst-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--paper)}
.inst-row:first-child{border-radius:10px 10px 0 0}
.inst-row:last-child{border-bottom:none;border-radius:0 0 10px 10px}
.inst-name{font-weight:600;font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inst-detail{font-size:10.5px;color:var(--ink-soft);margin-top:2px}
.inst-right{text-align:right;flex-shrink:0}
.inst-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--debt);font-variant-numeric:tabular-nums}
.inst-pz{font-size:10.5px;color:#1565C0;font-family:var(--mono);margin-top:2px}

/* ===== Abas de mês ===== */
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;align-items:stretch;overflow-x:auto;padding:0 6px;box-shadow:0 -4px 18px rgba(22,36,31,.07);scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;font-size:13.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;border-top:3px solid transparent;display:flex;align-items:center;gap:6px;}
.tab.active{color:var(--ledger);border-top-color:var(--ledger);background:var(--ledger-soft)}
.tab-add{padding:14px 16px;font-size:18px;color:var(--ledger);font-weight:700}

/* ===== FAB ===== */
.fab{position:fixed;right:18px;bottom:72px;width:56px;height:56px;border-radius:50%;background:var(--ledger);color:#fff;font-size:28px;font-weight:400;box-shadow:0 6px 20px rgba(11,92,70,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:5;}
.fab:active{transform:scale(.92)}

/* ===== Modais ===== */
.overlay{position:fixed;inset:0;background:rgba(22,36,31,.45);display:none;align-items:flex-end;justify-content:center;z-index:20;}
.overlay.open{display:flex}
.sheet{background:var(--card);width:100%;max-width:460px;border-radius:18px 18px 0 0;padding:20px 18px 26px;animation:up .25s cubic-bezier(.2,.8,.2,1);max-height:88vh;overflow-y:auto;}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
.sheet h2{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);font-size:15px;}
.field input[type=number]{font-family:var(--mono)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.switch-row span{font-size:14px;font-weight:600}
.sw{position:relative;width:46px;height:26px;border-radius:99px;background:var(--line);transition:background .2s}
.sw.on{background:var(--ledger)}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.sw.on::after{left:23px}
.btn{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:700;background:var(--ledger);color:#fff;margin-top:6px;}
.btn.ghost{background:transparent;color:var(--debt);font-weight:600;font-size:13px;padding:10px}
.btn:active{opacity:.85}
.prazo-hint{font-size:10.5px;color:var(--ink-soft);margin-top:4px;font-style:italic;min-height:14px}

/* toast */
.toast{position:fixed;left:50%;bottom:130px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:all .3s;z-index:50;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:560px){
  header,.summary{padding-left:max(18px,calc(50% - 252px));padding-right:max(18px,calc(50% - 252px))}
  main{max-width:540px;margin:0 auto;width:100%}
}
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span>Caderneta</h1>
  <div class="hdr-actions">
    <button class="hdr-btn" id="btnDash">Visão Geral</button>
    <button class="hdr-btn" id="btnSalary">Renda</button>
    <button class="hdr-btn" id="btnExport">Exportar</button>
  </div>
</header>

<div class="summary">
  <div class="sobra-label">Sobra do mês</div>
  <div class="sobra" id="sobra">R$ 0,00</div>
  <div class="mini-stats">
    <div class="mini"><div class="k">Renda</div><div class="v" id="mRenda">—</div></div>
    <div class="mini"><div class="k">Dívidas</div><div class="v" id="mDiv">—</div></div>
    <div class="mini"><div class="k">Pendente</div><div class="v" id="mPend">—</div></div>
  </div>
  <div class="payprog">
    <div class="ptop"><span id="pTxt">0 de 0 contas pagas</span><span id="pPct">0%</span></div>
    <div class="pbar"><div id="pFill"></div></div>
  </div>
</div>

<main>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Buscar conta…">
    <select id="filterCat">
      <option value="">Todas</option>
      <option>Fixa</option><option>Assinatura</option><option>Cartão</option>
      <option>Empréstimo</option><option>Pessoa</option><option>Outro</option>
    </select>
    <select id="sortBy">
      <option value="due">Vencimento</option>
      <option value="value">Maior valor</option>
      <option value="name">Nome A–Z</option>
    </select>
  </div>
  <div id="listPend"></div>
  <div id="listPaid"></div>
  <div class="section-title" id="chartTitle" style="display:none">Por categoria</div>
  <div class="chart" id="chart" style="display:none"></div>
</main>

<button class="fab" id="fab" aria-label="Adicionar dívida">+</button>
<nav class="tabs" id="tabs"></nav>

<!-- Modal dívida -->
<div class="overlay" id="ovDebt">
  <div class="sheet">
    <h2 id="debtTitle">Nova dívida</h2>
    <div class="field"><label for="fName">Nome</label><input id="fName" placeholder="Ex.: Faculdade"></div>
    <div class="row2">
      <div class="field"><label for="fValue">Valor (R$)</label><input id="fValue" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0,00"></div>
      <div class="field"><label for="fDue">Dia vencimento</label><input id="fDue" type="number" inputmode="numeric" min="1" max="31" placeholder="10"></div>
    </div>
    <div class="field"><label for="fCat">Categoria</label>
      <select id="fCat">
        <option>Fixa</option><option>Assinatura</option><option>Cartão</option>
        <option>Empréstimo</option><option>Pessoa</option><option>Outro</option>
      </select>
    </div>
    <div class="field">
      <label for="fPrazo">Prazo (nº de meses)</label>
      <input id="fPrazo" type="number" inputmode="numeric" min="0" max="360" placeholder="0 = sem prazo fixo">
      <div class="prazo-hint" id="fPrazoHint"></div>
    </div>
    <div class="switch-row"><span>Recorrente (repete todo mês)</span><button class="sw" id="fRec" role="switch" aria-checked="false" aria-label="Recorrente"></button></div>
    <button class="btn" id="saveDebt">Salvar conta</button>
    <button class="btn ghost" id="delDebt" style="display:none">Excluir conta</button>
    <button class="btn ghost" style="color:var(--ink-soft)" id="closeDebt">Cancelar</button>
  </div>
</div>

<!-- Modal renda -->
<div class="overlay" id="ovSalary">
  <div class="sheet">
    <h2>Renda do mês</h2>
    <div class="field"><label for="fSalary">Salário líquido (R$)</label><input id="fSalary" type="number" inputmode="decimal" step="0.01" min="0"></div>
    <button class="btn" id="saveSalary">Salvar renda</button>
    <button class="btn ghost" style="color:var(--ink-soft)" id="closeSalary">Cancelar</button>
  </div>
</div>

<!-- Modal novo mês -->
<div class="overlay" id="ovMonth">
  <div class="sheet">
    <h2>Novo mês</h2>
    <div class="field"><label for="fMonth">Nome do mês</label><input id="fMonth" placeholder="Ex.: Julho 26"></div>
    <div class="switch-row"><span>Copiar contas recorrentes do mês atual</span><button class="sw on" id="fCopy" role="switch" aria-checked="true" aria-label="Copiar recorrentes"></button></div>
    <button class="btn" id="saveMonth">Criar mês</button>
    <button class="btn ghost" id="delMonth">Excluir mês atual</button>
    <button class="btn ghost" style="color:var(--ink-soft)" id="closeMonth">Cancelar</button>
  </div>
</div>

<!-- Modal visão geral -->
<div class="overlay" id="ovDash">
  <div class="sheet">
    <h2>Visão Geral</h2>
    <div id="dashContent"></div>
    <button class="btn ghost" style="color:var(--ink-soft);margin-top:10px" id="closeDash">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= Estado & persistência ================= */
const KEY='caderneta-v1';
let state={months:{},order:[],current:null};
let memOnly=false;

async function load(){
  try{
    if(window.storage){
      const r=await window.storage.get(KEY);
      if(r&&r.value){state=JSON.parse(r.value);return}
    }
  }catch(e){}
  if(!window.storage)memOnly=true;
  seed();
}
let saveTimer=null;
function save(){
  if(memOnly)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await window.storage.set(KEY,JSON.stringify(state))}catch(e){console.error(e)}
  },300);
}
function seed(){
  const now=new Date();
  const nome=now.toLocaleDateString('pt-BR',{month:'long'})+' '+String(now.getFullYear()).slice(2);
  const id=uid();
  state.months[id]={name:cap(nome),salary:0,debts:[]};
  state.order=[id];state.current=id;
}
const uid=()=>Math.random().toString(36).slice(2,10);
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
const fmt=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const cur=()=>state.months[state.current];

/* ================= Render ================= */
function render(){renderTabs();renderSummary();renderList();renderChart();}

function renderTabs(){
  const t=document.getElementById('tabs');t.innerHTML='';
  state.order.forEach(id=>{
    const b=document.createElement('button');
    b.className='tab'+(id===state.current?' active':'');
    b.textContent=state.months[id].name;
    b.onclick=()=>{state.current=id;save();render()};
    t.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='tab-add';add.textContent='+';add.title='Novo mês';
  add.onclick=()=>openMonth();
  t.appendChild(add);
}

function renderSummary(){
  const m=cur();
  const total=m.debts.reduce((s,d)=>s+d.value,0);
  const pend=m.debts.filter(d=>!d.paid).reduce((s,d)=>s+d.value,0);
  const sobra=m.salary-total;
  const el=document.getElementById('sobra');
  el.textContent=fmt(sobra);
  el.className='sobra '+(sobra<0?'neg':'pos');
  document.getElementById('mRenda').textContent=m.salary?fmt(m.salary):'—';
  document.getElementById('mDiv').textContent=fmt(total);
  document.getElementById('mPend').textContent=fmt(pend);
  const pagas=m.debts.filter(d=>d.paid).length;
  const pct=m.debts.length?Math.round(pagas/m.debts.length*100):0;
  document.getElementById('pTxt').textContent=`${pagas} de ${m.debts.length} contas pagas`;
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pFill').style.width=pct+'%';
}

function filteredDebts(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('filterCat').value;
  const sort=document.getElementById('sortBy').value;
  let arr=cur().debts.filter(d=>(!q||d.name.toLowerCase().includes(q))&&(!cat||d.cat===cat));
  arr.sort((a,b)=>{
    if(sort==='value')return b.value-a.value;
    if(sort==='name')return a.name.localeCompare(b.name,'pt-BR');
    return (a.due||32)-(b.due||32);
  });
  return arr;
}

function debtCard(d){
  const div=document.createElement('div');
  div.className='debt'+(d.paid?' paid':'');
  let badge='';
  if(d.prazo>0) badge=`<span class="tag prazo">${d.prazo}/${d.prazoOrig}x</span>`;
  else if(d.rec) badge='<span class="tag rec">Recorrente</span>';
  div.innerHTML=`
    <button class="chk ${d.paid?'on':''}" aria-label="Marcar como paga">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
    </button>
    <div class="dinfo">
      <div class="dname"></div>
      <div class="dmeta">
        <span class="tag">${d.cat}</span>
        ${badge}
        ${d.due?`<span>vence dia ${d.due}</span>`:''}
      </div>
    </div>
    <div class="dval">${fmt(d.value)}</div>
    <button class="dmenu" aria-label="Editar">✎</button>`;
  div.querySelector('.dname').textContent=d.name;
  div.querySelector('.chk').onclick=()=>{d.paid=!d.paid;save();render();if(d.paid)toast('Conta paga ✓')};
  div.querySelector('.dmenu').onclick=()=>openDebt(d);
  return div;
}

function renderList(){
  const arr=filteredDebts();
  const pend=arr.filter(d=>!d.paid), paid=arr.filter(d=>d.paid);
  const lp=document.getElementById('listPend'), lg=document.getElementById('listPaid');
  lp.innerHTML='';lg.innerHTML='';
  if(!cur().debts.length){
    lp.innerHTML=`<div class="empty"><div class="big">📒</div>
      <p>Nenhuma conta neste mês ainda. Toque em <b>+</b> para cadastrar a primeira dívida.</p></div>`;
    return;
  }
  if(pend.length){
    const t=document.createElement('div');t.className='section-title';
    t.innerHTML=`A pagar <span class="sub">${fmt(pend.reduce((s,d)=>s+d.value,0))}</span>`;
    lp.appendChild(t);
    pend.forEach(d=>lp.appendChild(debtCard(d)));
  }
  if(paid.length){
    const t=document.createElement('div');t.className='section-title';
    t.textContent='Pagas';
    lg.appendChild(t);
    paid.forEach(d=>lg.appendChild(debtCard(d)));
  }
}

function renderChart(){
  const m=cur();
  const ch=document.getElementById('chart'),ti=document.getElementById('chartTitle');
  if(!m.debts.length){ch.style.display='none';ti.style.display='none';return}
  ch.style.display='block';ti.style.display='flex';
  const cats={};
  m.debts.forEach(d=>cats[d.cat]=(cats[d.cat]||0)+d.value);
  const max=Math.max(...Object.values(cats));
  ch.innerHTML='';
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>{
    const r=document.createElement('div');r.className='crow';
    r.innerHTML=`<div class="clabel">${c}</div>
      <div class="cbarwrap"><div class="cbar"></div></div>
      <div class="cval">${fmt(v)}</div>`;
    ch.appendChild(r);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{r.querySelector('.cbar').style.width=(v/max*100)+'%'}));
  });
}

/* ================= Dashboard ================= */
function renderDashboard(){
  const el=document.getElementById('dashContent');
  el.innerHTML='';

  const allMonths=state.order.map(id=>{
    const m=state.months[id];
    const total=m.debts.reduce((s,d)=>s+d.value,0);
    return{id,name:m.name,total,salary:m.salary,sobra:m.salary-total,debts:m.debts};
  });

  const curIdx=state.order.indexOf(state.current);
  const futureIds=state.order.slice(curIdx+1);
  const totalGeral=allMonths.reduce((s,m)=>s+m.total,0);
  const totalFuturo=futureIds.reduce((s,id)=>s+state.months[id].debts.reduce((ss,d)=>ss+d.value,0),0);
  const sobraAcum=allMonths.reduce((s,m)=>s+m.sobra,0);
  const pendenteMes=cur().debts.filter(d=>!d.paid).reduce((s,d)=>s+d.value,0);

  // Grid stats globais
  const grid=document.createElement('div');
  grid.className='dash-grid';
  const mk=(k,v,cls,sub)=>{
    const d=document.createElement('div');d.className='dash-stat';
    d.innerHTML=`<div class="k">${k}</div><div class="v ${cls}">${v}</div><div class="vsub">${sub}</div>`;
    return d;
  };
  grid.appendChild(mk('Total Geral',fmt(totalGeral),'neg',`${state.order.length} mese${state.order.length!==1?'s':''} no total`));
  grid.appendChild(mk('Dívidas Futuras',fmt(totalFuturo),totalFuturo===0?'pos':'neg',`${futureIds.length} mese${futureIds.length!==1?'s':''} à frente`));
  grid.appendChild(mk('Sobra Acumulada',fmt(sobraAcum),sobraAcum>=0?'pos':'neg','todos os meses'));
  grid.appendChild(mk('Pendente Agora',fmt(pendenteMes),'neg','mês atual'));
  el.appendChild(grid);

  // Por mês
  const sub1=document.createElement('div');sub1.className='dash-sub';sub1.textContent='Dívidas por mês';
  el.appendChild(sub1);
  const maxTotal=Math.max(...allMonths.map(m=>m.total),1);
  const mList=document.createElement('div');
  allMonths.forEach(m=>{
    const isCur=m.id===state.current;
    const row=document.createElement('div');row.className='dmr';
    row.innerHTML=`
      <div class="dmr-left">
        <div class="dmr-name${isCur?' cur':''}">
          <span></span>${isCur?'<span class="dmr-badge">atual</span>':''}
        </div>
        <div class="dmr-bar"><div class="dmr-barfill" data-w="${(m.total/maxTotal*100).toFixed(1)}"></div></div>
      </div>
      <div class="dmr-right">
        <div class="dmr-total">${fmt(m.total)}</div>
        <div class="dmr-sobra ${m.sobra>=0?'pos':'neg'}">${m.salary?fmt(m.sobra):'sem renda'}</div>
      </div>`;
    row.querySelector('.dmr-name span').textContent=m.name;
    mList.appendChild(row);
  });
  el.appendChild(mList);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    mList.querySelectorAll('.dmr-barfill').forEach(b=>{b.style.width=b.dataset.w+'%'});
  }));

  // Parcelamentos ativos (prazo > 0) — mês atual + futuros, dedup por nome+prazoOrig
  const instMap=new Map();
  [state.current,...futureIds].forEach(id=>{
    state.months[id].debts.forEach(d=>{
      if(d.prazo>0){
        const key=d.name+'|'+d.prazoOrig;
        if(!instMap.has(key)||d.prazo>instMap.get(key).prazo)
          instMap.set(key,{...d,monthName:state.months[id].name});
      }
    });
  });
  const insts=[...instMap.values()].sort((a,b)=>b.prazo-a.prazo);

  if(insts.length){
    const sub2=document.createElement('div');sub2.className='dash-sub';sub2.textContent='Parcelamentos ativos';
    el.appendChild(sub2);
    const iList=document.createElement('div');
    insts.forEach(d=>{
      const ir=document.createElement('div');ir.className='inst-row';
      const pct=Math.round((1-d.prazo/d.prazoOrig)*100);
      ir.innerHTML=`
        <div style="flex:1;min-width:0">
          <div class="inst-name"></div>
          <div class="inst-detail">${d.cat} · vence dia ${d.due||'—'} · ${pct}% quitado</div>
        </div>
        <div class="inst-right">
          <div class="inst-val">${fmt(d.value)}/mês</div>
          <div class="inst-pz">${d.prazo}/${d.prazoOrig}x restantes</div>
        </div>`;
      ir.querySelector('.inst-name').textContent=d.name;
      iList.appendChild(ir);
    });
    el.appendChild(iList);
  }
}

document.getElementById('btnDash').onclick=()=>{renderDashboard();open('ovDash')};
document.getElementById('closeDash').onclick=()=>close('ovDash');

/* ================= Modais gerais ================= */
let editing=null;
const ov=id=>document.getElementById(id);
function open(id){ov(id).classList.add('open')}
function close(id){ov(id).classList.remove('open')}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')});
});
function swToggle(btn){
  btn.classList.toggle('on');
  btn.setAttribute('aria-checked',btn.classList.contains('on'));
}
document.getElementById('fRec').onclick=e=>swToggle(e.currentTarget);
document.getElementById('fCopy').onclick=e=>swToggle(e.currentTarget);

document.getElementById('fPrazo').addEventListener('input',function(){
  const v=parseInt(this.value)||0;
  const hint=document.getElementById('fPrazoHint');
  if(v<=0){hint.textContent='';return}
  if(editing&&editing.prazoOrig&&v===editing.prazoOrig){
    hint.textContent=`${editing.prazo} de ${editing.prazoOrig} meses restantes`;
  }else{
    hint.textContent=`Repete por ${v} ${v===1?'mês':'meses'} e para automaticamente`;
  }
});

function openDebt(d){
  editing=d||null;
  document.getElementById('debtTitle').textContent=d?'Editar conta':'Nova dívida';
  document.getElementById('fName').value=d?d.name:'';
  document.getElementById('fValue').value=d?d.value:'';
  document.getElementById('fDue').value=d&&d.due?d.due:'';
  document.getElementById('fCat').value=d?d.cat:'Fixa';
  const prazoInput=document.getElementById('fPrazo');
  const hint=document.getElementById('fPrazoHint');
  if(d&&d.prazoOrig){
    prazoInput.value=d.prazoOrig;
    hint.textContent=`${d.prazo} de ${d.prazoOrig} meses restantes`;
  }else{
    prazoInput.value='';hint.textContent='';
  }
  const rec=document.getElementById('fRec');
  rec.classList.toggle('on',!!(d&&d.rec));
  rec.setAttribute('aria-checked',!!(d&&d.rec));
  document.getElementById('delDebt').style.display=d?'block':'none';
  open('ovDebt');
  if(!d)setTimeout(()=>document.getElementById('fName').focus(),250);
}
document.getElementById('fab').onclick=()=>openDebt(null);
document.getElementById('closeDebt').onclick=()=>close('ovDebt');
document.getElementById('saveDebt').onclick=()=>{
  const name=document.getElementById('fName').value.trim();
  const value=parseFloat(document.getElementById('fValue').value);
  if(!name||!(value>0)){toast('Preencha nome e valor');return}
  const due=parseInt(document.getElementById('fDue').value)||null;
  const cat=document.getElementById('fCat').value;
  const rec=document.getElementById('fRec').classList.contains('on');
  const prazoTotal=parseInt(document.getElementById('fPrazo').value)||0;

  if(editing){
    const prevLeft=editing.prazo||0;
    if(prazoTotal>0){
      editing.prazoOrig=prazoTotal;
      editing.prazo=prevLeft>0?Math.min(prevLeft,prazoTotal):prazoTotal;
    }else{
      delete editing.prazo;delete editing.prazoOrig;
    }
    Object.assign(editing,{name,value,due,cat,rec});
  }else{
    const d={id:uid(),name,value,due,cat,rec,paid:false};
    if(prazoTotal>0){d.prazo=prazoTotal;d.prazoOrig=prazoTotal}
    cur().debts.push(d);
  }
  save();close('ovDebt');render();
  toast(editing?'Conta atualizada':'Conta adicionada');
};
document.getElementById('delDebt').onclick=()=>{
  cur().debts=cur().debts.filter(d=>d!==editing);
  save();close('ovDebt');render();toast('Conta excluída');
};

document.getElementById('btnSalary').onclick=()=>{
  document.getElementById('fSalary').value=cur().salary||'';
  open('ovSalary');
};
document.getElementById('closeSalary').onclick=()=>close('ovSalary');
document.getElementById('saveSalary').onclick=()=>{
  cur().salary=parseFloat(document.getElementById('fSalary').value)||0;
  save();close('ovSalary');render();toast('Renda salva');
};

function openMonth(){
  const now=new Date();now.setMonth(now.getMonth()+state.order.length);
  document.getElementById('fMonth').value=
    cap(now.toLocaleDateString('pt-BR',{month:'long'}))+' '+String(now.getFullYear()).slice(2);
  open('ovMonth');
}
document.getElementById('closeMonth').onclick=()=>close('ovMonth');
document.getElementById('saveMonth').onclick=()=>{
  const name=document.getElementById('fMonth').value.trim();
  if(!name){toast('Dê um nome ao mês');return}
  const copy=document.getElementById('fCopy').classList.contains('on');
  const id=uid();
  let debts=[];
  if(copy){
    cur().debts.forEach(d=>{
      if(d.prazo>0){
        // parcelamento com prazo: copia se ainda restam meses
        if(d.prazo>1) debts.push({...d,id:uid(),paid:false,prazo:d.prazo-1,prazoOrig:d.prazoOrig});
      }else if(d.rec){
        // recorrente indefinido
        debts.push({...d,id:uid(),paid:false});
      }
    });
  }
  state.months[id]={name,salary:cur().salary,debts};
  state.order.push(id);state.current=id;
  save();close('ovMonth');render();
  toast(copy&&debts.length?`Mês criado com ${debts.length} recorrentes`:'Mês criado');
};
document.getElementById('delMonth').onclick=()=>{
  if(state.order.length<=1){toast('Não dá para excluir o único mês');return}
  if(!confirm(`Excluir "${cur().name}" e todas as contas dele?`))return;
  delete state.months[state.current];
  state.order=state.order.filter(i=>i!==state.current);
  state.current=state.order[state.order.length-1];
  save();close('ovMonth');render();toast('Mês excluído');
};

document.getElementById('btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='caderneta-backup.json';
  a.click();URL.revokeObjectURL(a.href);toast('Backup exportado');
};

['search','filterCat','sortBy'].forEach(id=>
  document.getElementById(id).addEventListener('input',renderList));

let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

load().then(()=>{
  if(!state.current||!state.months[state.current])seed();
  render();
  if(memOnly)toast('Sem armazenamento — dados só nesta sessão');
});
</script>
</body>
