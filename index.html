<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderneta — Dívidas Mensais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ECEFF1;--card:#FFFFFF;--ink:#16241F;--ink-soft:#5A6B64;
  --ledger:#0B5C46;--ledger-soft:#E1EEE9;--debt:#C0392B;--debt-soft:#FAEAE8;
  --gold:#B98A2F;--line:#D5DBD8;--radius:10px;
  --mono:'JetBrains Mono',monospace;--sans:'Archivo',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:inherit;color:inherit}
:focus-visible{outline:2px solid var(--ledger);outline-offset:2px}

/* ===== Header ===== */
header{background:var(--ledger);color:#F2F7F5;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
header h1{font-size:17px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;font-stretch:90%;display:flex;align-items:center;gap:8px}
header h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);display:inline-block}
.hdr-actions{display:flex;gap:6px}
.hdr-btn{font-size:12px;font-weight:600;padding:7px 11px;border-radius:7px;background:rgba(255,255,255,.13);color:#fff}
.hdr-btn:hover{background:rgba(255,255,255,.24)}

/* ===== Resumo ===== */
.summary{background:var(--ledger);color:#fff;padding:4px 18px 20px}
.sobra-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.sobra{font-family:var(--mono);font-size:42px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums;transition:color .3s}
.sobra.neg{color:#FFB3A7}.sobra.pos{color:#A8E6C9}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.mini{background:rgba(255,255,255,.09);border-radius:8px;padding:9px 11px}
.mini .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.mini .v{font-family:var(--mono);font-size:15px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.payprog{margin-top:14px}
.payprog .ptop{display:flex;justify-content:space-between;font-size:11px;opacity:.85;margin-bottom:5px}
.pbar{height:8px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden}
.pbar>div{height:100%;background:var(--gold);border-radius:99px;width:0;transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* ===== Corpo ===== */
main{flex:1;overflow-y:auto;padding:16px 14px 110px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input[type=search]{flex:1;min-width:140px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-size:14px}
.toolbar select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-size:13px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);margin:18px 2px 8px;display:flex;justify-content:space-between;align-items:baseline}
.section-title .sub{font-family:var(--mono);font-size:12px;color:var(--debt)}

/* cartão de dívida */
.debt{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:opacity .25s,transform .15s,box-shadow .15s}
.debt:hover{box-shadow:0 2px 12px rgba(22,36,31,.1)}
.debt.paid{opacity:.55}
.debt.paid .dval{text-decoration:line-through}
.chk{width:24px;height:24px;min-width:24px;border:2px solid var(--ledger);border-radius:7px;display:flex;align-items:center;justify-content:center;background:#fff;transition:background .15s;flex-shrink:0}
.chk.on{background:var(--ledger)}
.chk svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .15s}
.chk.on svg{opacity:1}
.dinfo{flex:1;min-width:0}
.dname{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dmeta{font-size:11.5px;color:var(--ink-soft);display:flex;gap:7px;align-items:center;margin-top:2px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:99px;background:var(--ledger-soft);color:var(--ledger)}
.tag.rec{background:#FDF3E0;color:var(--gold)}
.tag.prazo{background:#E3F2FD;color:#1565C0}
.tag.paid-tag{background:#E8F5E9;color:#2E7D32}
.dval{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--debt);font-variant-numeric:tabular-nums;white-space:nowrap}
.dmenu{padding:6px;color:var(--ink-soft);border-radius:6px;flex-shrink:0}
.dmenu:hover{background:var(--paper)}
.empty{text-align:center;padding:48px 20px;color:var(--ink-soft)}
.empty .big{font-size:38px;margin-bottom:10px}
.empty p{font-size:14px;max-width:260px;margin:0 auto;line-height:1.5}

/* gráfico por categoria */
.chart{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.crow:last-child{margin-bottom:0}
.clabel{width:86px;font-size:11.5px;font-weight:600;color:var(--ink-soft);text-align:right}
.cbarwrap{flex:1;height:16px;background:var(--paper);border-radius:5px;overflow:hidden}
.cbar{height:100%;background:var(--ledger);border-radius:5px;width:0;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.cval{font-family:var(--mono);font-size:11.5px;width:80px;font-variant-numeric:tabular-nums}

/* ===== Prazo (campo expansível) ===== */
.prazo-toggle{
  width:100%;padding:11px 14px;border:1.5px dashed var(--line);border-radius:8px;
  background:transparent;font-size:13.5px;font-weight:600;color:var(--ink-soft);
  text-align:left;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:13px;transition:border-color .2s,color .2s;
}
.prazo-toggle:hover,.prazo-toggle.open{border-color:var(--ledger);color:var(--ledger);border-style:solid}
.pt-icon{font-size:16px;transition:transform .25s;line-height:1}
.prazo-toggle.open .pt-icon{transform:rotate(45deg)}
.prazo-wrap{max-height:0;overflow:hidden;opacity:0;transition:max-height .3s cubic-bezier(.2,.8,.2,1),opacity .25s}
.prazo-wrap.open{max-height:110px;opacity:1}
.prazo-hint{font-size:11px;color:var(--ink-soft);margin-top:5px;font-style:italic;min-height:14px}

/* ===== Modal de Detalhes ===== */
.det-name{font-size:21px;font-weight:800;line-height:1.2;margin-bottom:8px}
.det-val{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--debt);font-variant-numeric:tabular-nums;margin-bottom:12px;line-height:1}
.det-val.is-paid{text-decoration:line-through;opacity:.55;color:var(--ledger)}
.det-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.det-meta{font-size:13px;color:var(--ink-soft);margin-bottom:0}
.det-divider{height:1px;background:var(--line);margin:16px 0}
.det-section{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline}
.det-section span{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:600;letter-spacing:0;text-transform:none}
/* barra de progresso das parcelas */
.inst-pbar{height:6px;border-radius:99px;background:var(--paper);overflow:hidden;margin-bottom:3px}
.inst-pfill{height:100%;background:var(--ledger);border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.inst-plabel{font-size:10.5px;color:var(--ink-soft);margin-bottom:12px;display:flex;justify-content:space-between}
/* timeline */
.tl{display:flex;flex-direction:column}
.tl-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.tl-row:last-child{border-bottom:none}
.tl-dot{width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tl-dot.done{background:var(--ledger);border-color:var(--ledger)}
.tl-dot.cur{border:2.5px solid var(--ledger);background:#fff;box-shadow:0 0 0 3px var(--ledger-soft)}
.tl-dot.fut{background:#fff;border-color:var(--line)}
.tl-dot svg{width:9px;height:9px;stroke:#fff;stroke-width:3;fill:none}
.tl-month{flex:1;font-size:13px;font-weight:600}
.tl-month.cur{color:var(--ledger)}
.tl-month.fut{color:var(--ink-soft);font-weight:500}
.tl-num{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);min-width:28px;text-align:right}
.tl-st{font-size:11px;font-weight:700;min-width:52px;text-align:right}
.tl-st.s-paid{color:var(--ledger)}.tl-st.s-pend{color:var(--debt)}.tl-st.s-fut{color:var(--ink-soft);font-weight:500}
.tl-future-note{font-size:12px;color:var(--ink-soft);font-style:italic;padding:8px 0 0;text-align:center}
/* botão pagar no modal detalhe */
.btn-pay{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:700;margin-top:6px;border:2px solid var(--ledger);color:var(--ledger);background:var(--ledger-soft)}
.btn-pay.is-paid{background:var(--ledger);color:#fff}
.btn-pay:active{opacity:.85}

/* ===== Dashboard ===== */
.dash-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.dash-kpi{background:var(--paper);border-radius:10px;padding:14px 14px 12px}
.dash-kpi .dk-k{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.dash-kpi .dk-v{font-family:var(--mono);font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.dash-kpi .dk-v.pos{color:var(--ledger)}.dash-kpi .dk-v.neg{color:var(--debt)}
.dash-kpi .dk-sub{font-size:10px;color:var(--ink-soft);margin-top:4px}
.dash-sub{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center}
.dash-sub span{font-family:var(--mono);font-size:11px;color:var(--ink);letter-spacing:0;text-transform:none;font-weight:600}
/* lista de meses no dashboard */
.dm-list{border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.dm-row{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s}
.dm-row:last-child{border-bottom:none}
.dm-row:hover{background:var(--ledger-soft)}
.dm-row.dm-cur{background:var(--ledger-soft)}
.dm-left{flex:1;min-width:0}
.dm-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.dm-badge{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:99px;background:var(--ledger);color:#fff;flex-shrink:0}
.dm-bar{height:3px;background:var(--line);border-radius:2px;margin-top:5px;overflow:hidden}
.dm-barfill{height:100%;border-radius:2px;background:var(--debt);width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.dm-right{text-align:right;flex-shrink:0;min-width:80px}
.dm-total{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--debt);font-variant-numeric:tabular-nums}
.dm-sobra{font-family:var(--mono);font-size:10px;margin-top:2px;font-variant-numeric:tabular-nums}
.dm-sobra.pos{color:var(--ledger)}.dm-sobra.neg{color:var(--debt)}
/* parcelamentos no dashboard */
.inst-list{border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.il-row{background:var(--card);border-bottom:1px solid var(--line);padding:11px 13px}
.il-row:last-child{border-bottom:none}
.il-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.il-name{flex:1;font-weight:600;font-size:13px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.il-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--debt);font-variant-numeric:tabular-nums;flex-shrink:0}
.il-bar{height:5px;border-radius:99px;background:var(--paper);overflow:hidden;margin-bottom:4px}
.il-barfill{height:100%;border-radius:99px;background:var(--ledger);width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.il-meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-soft)}
.il-meta .il-pz{color:#1565C0;font-family:var(--mono);font-weight:600}
/* top categorias no dashboard */
.cat-list{border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--card);border-bottom:1px solid var(--line)}
.cat-row:last-child{border-bottom:none}
.cat-name{flex:1;font-weight:600;font-size:13px}
.cat-bw{flex:1;height:8px;background:var(--paper);border-radius:4px;overflow:hidden}
.cat-bf{height:100%;background:var(--ledger);border-radius:4px;width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.cat-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--debt);min-width:68px;text-align:right;font-variant-numeric:tabular-nums}
.dash-empty{text-align:center;padding:20px;color:var(--ink-soft);font-size:13px;font-style:italic}

/* ===== Abas de mês ===== */
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;align-items:stretch;overflow-x:auto;padding:0 6px;box-shadow:0 -4px 18px rgba(22,36,31,.07);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;font-size:13.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;border-top:3px solid transparent;display:flex;align-items:center;gap:6px}
.tab.active{color:var(--ledger);border-top-color:var(--ledger);background:var(--ledger-soft)}
.tab-add{padding:14px 16px;font-size:18px;color:var(--ledger);font-weight:700}

/* ===== FAB ===== */
.fab{position:fixed;right:18px;bottom:72px;width:56px;height:56px;border-radius:50%;background:var(--ledger);color:#fff;font-size:28px;box-shadow:0 6px 20px rgba(11,92,70,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:5}
.fab:active{transform:scale(.92)}

/* ===== Modais ===== */
.overlay{position:fixed;inset:0;background:rgba(22,36,31,.45);display:none;align-items:flex-end;justify-content:center;z-index:20}
.overlay.open{display:flex}
.sheet{background:var(--card);width:100%;max-width:460px;border-radius:18px 18px 0 0;padding:20px 18px 26px;animation:up .25s cubic-bezier(.2,.8,.2,1);max-height:90vh;overflow-y:auto}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
.sheet h2{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);font-size:15px}
.field input[type=number]{font-family:var(--mono)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.switch-row span{font-size:14px;font-weight:600}
.sw{position:relative;width:46px;height:26px;border-radius:99px;background:var(--line);transition:background .2s}
.sw.on{background:var(--ledger)}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.sw.on::after{left:23px}
.btn{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:700;background:var(--ledger);color:#fff;margin-top:6px}
.btn.ghost{background:transparent;color:var(--debt);font-weight:600;font-size:13px;padding:10px}
.btn:active{opacity:.85}

/* toast */
.toast{position:fixed;left:50%;bottom:130px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:all .3s;z-index:50;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:560px){
  header,.summary{padding-left:max(18px,calc(50% - 252px));padding-right:max(18px,calc(50% - 252px))}
  main{max-width:540px;margin:0 auto;width:100%}
}
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span>Caderneta</h1>
  <div class="hdr-actions">
    <button class="hdr-btn" id="btnDash">Dashboard</button>
    <button class="hdr-btn" id="btnSalary">Renda</button>
    <button class="hdr-btn" id="btnExport">Exportar</button>
  </div>
</header>

<div class="summary">
  <div class="sobra-label">Sobra do mês</div>
  <div class="sobra" id="sobra">R$ 0,00</div>
  <div class="mini-stats">
    <div class="mini"><div class="k">Renda</div><div class="v" id="mRenda">—</div></div>
    <div class="mini"><div class="k">Dívidas</div><div class="v" id="mDiv">—</div></div>
    <div class="mini"><div class="k">Pendente</div><div class="v" id="mPend">—</div></div>
  </div>
  <div class="payprog">
    <div class="ptop"><span id="pTxt">0 de 0 contas pagas</span><span id="pPct">0%</span></div>
    <div class="pbar"><div id="pFill"></div></div>
  </div>
</div>

<main>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Buscar conta…">
    <select id="filterCat">
      <option value="">Todas</option>
      <option>Fixa</option><option>Assinatura</option><option>Cartão</option>
      <option>Empréstimo</option><option>Pessoa</option><option>Outro</option>
    </select>
    <select id="sortBy">
      <option value="due">Vencimento</option>
      <option value="value">Maior valor</option>
      <option value="name">Nome A–Z</option>
    </select>
  </div>
  <div id="listPend"></div>
  <div id="listPaid"></div>
  <div class="section-title" id="chartTitle" style="display:none">Por categoria</div>
  <div class="chart" id="chart" style="display:none"></div>
</main>

<button class="fab" id="fab" aria-label="Adicionar dívida">+</button>
<nav class="tabs" id="tabs"></nav>

<!-- Modal nova/editar dívida -->
<div class="overlay" id="ovDebt">
  <div class="sheet">
    <h2 id="debtTitle">Nova dívida</h2>
    <div class="field"><label for="fName">Nome</label><input id="fName" placeholder="Ex.: Faculdade"></div>
    <div class="row2">
      <div class="field"><label for="fValue">Valor (R$)</label><input id="fValue" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0,00"></div>
      <div class="field"><label for="fDue">Dia vencimento</label><input id="fDue" type="number" inputmode="numeric" min="1" max="31" placeholder="10"></div>
    </div>
    <div class="field"><label for="fCat">Categoria</label>
      <select id="fCat">
        <option>Fixa</option><option>Assinatura</option><option>Cartão</option>
        <option>Empréstimo</option><option>Pessoa</option><option>Outro</option>
      </select>
    </div>
    <!-- prazo colapsável -->
    <button class="prazo-toggle" id="btnPrazoToggle" type="button" aria-expanded="false">
      <span id="prazoToggleLabel">+ Definir prazo (parcelas)</span>
      <span class="pt-icon">+</span>
    </button>
    <div class="prazo-wrap" id="prazoWrap">
      <div class="field" style="margin-bottom:4px">
        <label for="fPrazo">Número de meses</label>
        <input id="fPrazo" type="number" inputmode="numeric" min="1" max="360" placeholder="Ex.: 6">
      </div>
      <div class="prazo-hint" id="fPrazoHint"></div>
    </div>
    <div class="switch-row"><span>Recorrente (repete todo mês)</span><button class="sw" id="fRec" role="switch" aria-checked="false" aria-label="Recorrente"></button></div>
    <button class="btn" id="saveDebt">Salvar conta</button>
    <button class="btn ghost" id="delDebt" style="display:none">Excluir conta</button>
    <button class="btn ghost" style="color:var(--ink-soft)" id="closeDebt">Cancelar</button>
  </div>
</div>

<!-- Modal detalhes da dívida -->
<div class="overlay" id="ovDetail">
  <div class="sheet" id="detailSheet"></div>
</div>

<!-- Modal renda -->
<div class="overlay" id="ovSalary">
  <div class="sheet">
    <h2>Renda do mês</h2>
    <div class="field"><label for="fSalary">Salário líquido (R$)</label><input id="fSalary" type="number" inputmode="decimal" step="0.01" min="0"></div>
    <button class="btn" id="saveSalary">Salvar renda</button>
    <button class="btn ghost" style="color:var(--ink-soft)" id="closeSalary">Cancelar</button>
  </div>
</div>

<!-- Modal novo mês -->
<div class="overlay" id="ovMonth">
  <div class="sheet">
    <h2>Novo mês</h2>
    <div class="field"><label for="fMonth">Nome do mês</label><input id="fMonth" placeholder="Ex.: Julho 26"></div>
    <div class="switch-row"><span>Copiar contas recorrentes do mês atual</span><button class="sw on" id="fCopy" role="switch" aria-checked="true" aria-label="Copiar recorrentes"></button></div>
    <button class="btn" id="saveMonth">Criar mês</button>
    <button class="btn ghost" id="delMonth">Excluir mês atual</button>
    <button class="btn ghost" style="color:var(--ink-soft)" id="closeMonth">Cancelar</button>
  </div>
</div>

<!-- Modal dashboard -->
<div class="overlay" id="ovDash">
  <div class="sheet">
    <h2>Dashboard</h2>
    <div id="dashContent"></div>
    <button class="btn ghost" style="color:var(--ink-soft);margin-top:8px" id="closeDash">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== Estado & persistência ===== */
const KEY='caderneta-v1';
let state={months:{},order:[],current:null};
let memOnly=false;

async function load(){
  try{
    if(window.storage){
      const r=await window.storage.get(KEY);
      if(r&&r.value){state=JSON.parse(r.value);return}
    }
  }catch(e){}
  if(!window.storage)memOnly=true;
  seed();
}
let saveTimer=null;
function save(){
  if(memOnly)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await window.storage.set(KEY,JSON.stringify(state))}catch(e){console.error(e)}
  },300);
}
function seed(){
  const now=new Date();
  const nome=now.toLocaleDateString('pt-BR',{month:'long'})+' '+String(now.getFullYear()).slice(2);
  const id=uid();
  state.months[id]={name:cap(nome),salary:0,debts:[]};
  state.order=[id];state.current=id;
}
const uid=()=>Math.random().toString(36).slice(2,10);
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
const fmt=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const cur=()=>state.months[state.current];

/* ===== Render principal ===== */
function render(){renderTabs();renderSummary();renderList();renderChart();}

function renderTabs(){
  const t=document.getElementById('tabs');t.innerHTML='';
  state.order.forEach(id=>{
    const b=document.createElement('button');
    b.className='tab'+(id===state.current?' active':'');
    b.textContent=state.months[id].name;
    b.onclick=()=>{state.current=id;save();render()};
    t.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='tab-add';add.textContent='+';add.title='Novo mês';
  add.onclick=()=>openMonth();
  t.appendChild(add);
}

function renderSummary(){
  const m=cur();
  const total=m.debts.reduce((s,d)=>s+d.value,0);
  const pend=m.debts.filter(d=>!d.paid).reduce((s,d)=>s+d.value,0);
  const sobra=m.salary-total;
  const el=document.getElementById('sobra');
  el.textContent=fmt(sobra);
  el.className='sobra '+(sobra<0?'neg':'pos');
  document.getElementById('mRenda').textContent=m.salary?fmt(m.salary):'—';
  document.getElementById('mDiv').textContent=fmt(total);
  document.getElementById('mPend').textContent=fmt(pend);
  const pagas=m.debts.filter(d=>d.paid).length;
  const pct=m.debts.length?Math.round(pagas/m.debts.length*100):0;
  document.getElementById('pTxt').textContent=`${pagas} de ${m.debts.length} contas pagas`;
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pFill').style.width=pct+'%';
}

function filteredDebts(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('filterCat').value;
  const sort=document.getElementById('sortBy').value;
  let arr=cur().debts.filter(d=>(!q||d.name.toLowerCase().includes(q))&&(!cat||d.cat===cat));
  arr.sort((a,b)=>{
    if(sort==='value')return b.value-a.value;
    if(sort==='name')return a.name.localeCompare(b.name,'pt-BR');
    return (a.due||32)-(b.due||32);
  });
  return arr;
}

function debtCard(d){
  const div=document.createElement('div');
  div.className='debt'+(d.paid?' paid':'');
  let badge='';
  if(d.prazo>0) badge=`<span class="tag prazo">${d.prazo}/${d.prazoOrig}x</span>`;
  else if(d.rec) badge='<span class="tag rec">Recorrente</span>';
  div.innerHTML=`
    <button class="chk ${d.paid?'on':''}" aria-label="Marcar como paga">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
    </button>
    <div class="dinfo">
      <div class="dname"></div>
      <div class="dmeta">
        <span class="tag">${d.cat}</span>${badge}
        ${d.due?`<span>vence dia ${d.due}</span>`:''}
      </div>
    </div>
    <div class="dval">${fmt(d.value)}</div>
    <button class="dmenu" aria-label="Editar">✎</button>`;
  div.querySelector('.dname').textContent=d.name;
  div.querySelector('.chk').onclick=e=>{
    e.stopPropagation();
    d.paid=!d.paid;save();render();
    if(d.paid)toast('Conta paga ✓');
  };
  div.querySelector('.dmenu').onclick=e=>{e.stopPropagation();openDebt(d)};
  div.onclick=()=>openDetail(d);
  return div;
}

function renderList(){
  const arr=filteredDebts();
  const pend=arr.filter(d=>!d.paid), paid=arr.filter(d=>d.paid);
  const lp=document.getElementById('listPend'), lg=document.getElementById('listPaid');
  lp.innerHTML='';lg.innerHTML='';
  if(!cur().debts.length){
    lp.innerHTML=`<div class="empty"><div class="big">📒</div>
      <p>Nenhuma conta neste mês ainda. Toque em <b>+</b> para cadastrar a primeira dívida.</p></div>`;
    return;
  }
  if(pend.length){
    const t=document.createElement('div');t.className='section-title';
    t.innerHTML=`A pagar <span class="sub">${fmt(pend.reduce((s,d)=>s+d.value,0))}</span>`;
    lp.appendChild(t);pend.forEach(d=>lp.appendChild(debtCard(d)));
  }
  if(paid.length){
    const t=document.createElement('div');t.className='section-title';
    t.textContent='Pagas';
    lg.appendChild(t);paid.forEach(d=>lg.appendChild(debtCard(d)));
  }
}

function renderChart(){
  const m=cur();
  const ch=document.getElementById('chart'),ti=document.getElementById('chartTitle');
  if(!m.debts.length){ch.style.display='none';ti.style.display='none';return}
  ch.style.display='block';ti.style.display='flex';
  const cats={};
  m.debts.forEach(d=>cats[d.cat]=(cats[d.cat]||0)+d.value);
  const max=Math.max(...Object.values(cats));
  ch.innerHTML='';
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>{
    const r=document.createElement('div');r.className='crow';
    r.innerHTML=`<div class="clabel">${c}</div>
      <div class="cbarwrap"><div class="cbar"></div></div>
      <div class="cval">${fmt(v)}</div>`;
    ch.appendChild(r);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{r.querySelector('.cbar').style.width=(v/max*100)+'%'}));
  });
}

/* ===== Modal de Detalhes ===== */
function findRelatedMonths(debt){
  if(!debt.prazoId)return[];
  const curIdx=state.order.indexOf(state.current);
  return state.order.map((id,idx)=>{
    const found=state.months[id].debts.find(d=>d.prazoId===debt.prazoId);
    if(!found)return null;
    const status=idx<curIdx?'past':(idx===curIdx?'cur':'future');
    return{monthId:id,monthName:state.months[id].name,debt:found,status,isCurrent:id===state.current};
  }).filter(Boolean);
}

function openDetail(d){
  const sheet=document.getElementById('detailSheet');
  sheet.innerHTML='';

  // Cabeçalho
  const name=document.createElement('div');name.className='det-name';name.textContent=d.name;
  const val=document.createElement('div');val.className='det-val'+(d.paid?' is-paid':'');val.textContent=fmt(d.value);
  const tags=document.createElement('div');tags.className='det-tags';
  tags.innerHTML=`<span class="tag">${d.cat}</span>`;
  if(d.prazo>0) tags.innerHTML+=`<span class="tag prazo">${d.prazo}/${d.prazoOrig}x restantes</span>`;
  else if(d.rec) tags.innerHTML+='<span class="tag rec">Recorrente</span>';
  if(d.paid) tags.innerHTML+='<span class="tag paid-tag">Pago ✓</span>';
  const meta=document.createElement('div');meta.className='det-meta';
  meta.textContent=d.due?`Vence todo dia ${d.due}`:'Sem data de vencimento definida';

  sheet.appendChild(name);sheet.appendChild(val);sheet.appendChild(tags);sheet.appendChild(meta);

  // Seção de parcelas
  if(d.prazoOrig>0){
    const div=document.createElement('div');div.className='det-divider';
    sheet.appendChild(div);

    const doneCount=d.prazoOrig-d.prazo;
    const pct=Math.round(doneCount/d.prazoOrig*100);

    const sec=document.createElement('div');sec.className='det-section';
    sec.innerHTML=`PARCELAS <span>${doneCount} de ${d.prazoOrig} concluídas</span>`;
    sheet.appendChild(sec);

    const pbar=document.createElement('div');pbar.className='inst-pbar';
    pbar.innerHTML=`<div class="inst-pfill" style="width:0%" data-w="${pct}"></div>`;
    sheet.appendChild(pbar);

    const plabel=document.createElement('div');plabel.className='inst-plabel';
    plabel.innerHTML=`<span>${pct}% quitado</span><span>${fmt(d.value*(d.prazoOrig-doneCount))} restante</span>`;
    sheet.appendChild(plabel);

    // Timeline
    const related=findRelatedMonths(d);
    const tl=document.createElement('div');tl.className='tl';

    if(related.length>0){
      related.forEach(r=>{
        const row=document.createElement('div');row.className='tl-row';
        const isPaid=r.debt.paid;
        const statusClass=r.status==='past'?'done':(r.status==='cur'?'cur':'fut');
        const stLabel=r.status==='past'?(isPaid?'Pago':'Pendente'):(r.status==='cur'?(isPaid?'Pago':'Em aberto'):'Futuro');
        const stClass=r.status==='past'?(isPaid?'s-paid':'s-pend'):(r.status==='cur'?(isPaid?'s-paid':'s-pend'):'s-fut');
        const installNum=related.indexOf(r)+1;
        row.innerHTML=`
          <div class="tl-dot ${statusClass}">${r.status!=='fut'?'<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>':''}</div>
          <div class="tl-month ${r.status==='cur'?'cur':(r.status==='fut'?'fut':'')}">
            ${r.monthName}${r.isCurrent?' <span style="font-size:10px;color:var(--ledger);font-weight:700">← atual</span>':''}
          </div>
          <div class="tl-num">${installNum}/${d.prazoOrig}x</div>
          <div class="tl-st ${stClass}">${stLabel}</div>`;
        tl.appendChild(row);
      });

      // Futuros não criados
      const futureInState=related.filter(r=>r.status==='future').length;
      const futureNotCreated=Math.max(0,d.prazo-1-futureInState);
      if(futureNotCreated>0){
        const note=document.createElement('div');note.className='tl-future-note';
        note.textContent=`+ ${futureNotCreated} ${futureNotCreated===1?'mês futuro ainda não criado':'meses futuros ainda não criados'}`;
        tl.appendChild(note);
      }
    }else{
      // prazoId não encontrado (dados antigos) — mostrar contagem simples
      const note=document.createElement('div');note.className='tl-future-note';
      note.textContent=`${d.prazo} ${d.prazo===1?'mês restante':'meses restantes'} de ${d.prazoOrig} totais`;
      tl.appendChild(note);
    }

    sheet.appendChild(tl);
  }

  const div2=document.createElement('div');div2.className='det-divider';
  sheet.appendChild(div2);

  // Botão pagar/desmarcar
  const payBtn=document.createElement('button');
  payBtn.className='btn-pay'+(d.paid?' is-paid':'');
  payBtn.textContent=d.paid?'Desmarcar como pago':'Marcar como pago';
  payBtn.onclick=()=>{
    d.paid=!d.paid;save();render();
    openDetail(d); // re-renderiza
    toast(d.paid?'Conta paga ✓':'Marcada como pendente');
  };
  sheet.appendChild(payBtn);

  // Botão editar
  const editBtn=document.createElement('button');
  editBtn.className='btn';editBtn.style.cssText='margin-top:8px';
  editBtn.textContent='Editar conta';
  editBtn.onclick=()=>{close('ovDetail');openDebt(d)};
  sheet.appendChild(editBtn);

  // Fechar
  const closeBtn=document.createElement('button');
  closeBtn.className='btn ghost';closeBtn.style.color='var(--ink-soft)';
  closeBtn.textContent='Fechar';
  closeBtn.onclick=()=>close('ovDetail');
  sheet.appendChild(closeBtn);

  open('ovDetail');

  // Animar barra
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const fill=sheet.querySelector('.inst-pfill');
    if(fill) fill.style.width=fill.dataset.w+'%';
  }));
}

/* ===== Dashboard ===== */
function renderDashboard(){
  const el=document.getElementById('dashContent');
  el.innerHTML='';

  const allMonths=state.order.map(id=>{
    const m=state.months[id];
    const total=m.debts.reduce((s,d)=>s+d.value,0);
    return{id,name:m.name,total,salary:m.salary,sobra:m.salary-total,debts:m.debts};
  });

  const curIdx=state.order.indexOf(state.current);
  const futureIds=state.order.slice(curIdx+1);
  const totalGeral=allMonths.reduce((s,m)=>s+m.total,0);
  const totalFuturo=futureIds.reduce((s,id)=>s+state.months[id].debts.reduce((ss,d)=>ss+d.value,0),0);
  const sobraAcum=allMonths.reduce((s,m)=>m.salary>0?s+m.sobra:s,0);
  const mediaMes=state.order.length>0?(totalGeral/state.order.length):0;

  // KPIs
  const grid=document.createElement('div');grid.className='dash-kpi-grid';
  const mk=(k,v,cls,sub)=>{
    const d=document.createElement('div');d.className='dash-kpi';
    d.innerHTML=`<div class="dk-k">${k}</div><div class="dk-v ${cls}">${v}</div><div class="dk-sub">${sub}</div>`;
    return d;
  };
  grid.appendChild(mk('Total Geral',fmt(totalGeral),'neg',`em ${state.order.length} mês${state.order.length!==1?'es':''}`));
  grid.appendChild(mk('Dívidas Futuras',fmt(totalFuturo),totalFuturo===0?'pos':'neg',`${futureIds.length} mês${futureIds.length!==1?'es':''} à frente`));
  grid.appendChild(mk('Sobra Acumulada',fmt(sobraAcum),sobraAcum>=0?'pos':'neg','meses com renda'));
  grid.appendChild(mk('Média Mensal',fmt(mediaMes),'neg','valor médio de dívidas'));
  el.appendChild(grid);

  // Gráfico por mês
  const sub1=document.createElement('div');sub1.className='dash-sub';
  sub1.innerHTML=`Gastos por mês <span>${fmt(totalGeral)}</span>`;
  el.appendChild(sub1);

  const maxTotal=Math.max(...allMonths.map(m=>m.total),1);
  const dmList=document.createElement('div');dmList.className='dm-list';
  allMonths.forEach(m=>{
    const isCur=m.id===state.current;
    const row=document.createElement('div');
    row.className='dm-row'+(isCur?' dm-cur':'');
    const pct=(m.total/maxTotal*100).toFixed(1);
    row.innerHTML=`
      <div class="dm-left">
        <div class="dm-name">
          <span></span>${isCur?'<span class="dm-badge">atual</span>':''}
        </div>
        <div class="dm-bar"><div class="dm-barfill" data-w="${pct}"></div></div>
      </div>
      <div class="dm-right">
        <div class="dm-total">${fmt(m.total)}</div>
        <div class="dm-sobra ${m.sobra>=0?'pos':'neg'}">${m.salary?fmt(m.sobra):'sem renda'}</div>
      </div>`;
    row.querySelector('.dm-name span').textContent=m.name;
    row.onclick=()=>{state.current=m.id;save();render();close('ovDash');toast(`Mês ${m.name} selecionado`)};
    dmList.appendChild(row);
  });
  el.appendChild(dmList);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    dmList.querySelectorAll('.dm-barfill').forEach(b=>{b.style.width=b.dataset.w+'%'});
  }));

  // Top categorias (todos os meses)
  const cats={};
  state.order.forEach(id=>state.months[id].debts.forEach(d=>cats[d.cat]=(cats[d.cat]||0)+d.value));
  const catEntries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  if(catEntries.length){
    const sub2=document.createElement('div');sub2.className='dash-sub';
    sub2.innerHTML=`Categorias <span>todos os meses</span>`;
    el.appendChild(sub2);
    const catMax=catEntries[0][1];
    const catList=document.createElement('div');catList.className='cat-list';
    catEntries.forEach(([c,v])=>{
      const r=document.createElement('div');r.className='cat-row';
      r.innerHTML=`<div class="cat-name">${c}</div>
        <div class="cat-bw"><div class="cat-bf" data-w="${(v/catMax*100).toFixed(1)}"></div></div>
        <div class="cat-val">${fmt(v)}</div>`;
      catList.appendChild(r);
    });
    el.appendChild(catList);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      catList.querySelectorAll('.cat-bf').forEach(b=>{b.style.width=b.dataset.w+'%'});
    }));
  }

  // Parcelamentos ativos
  const instMap=new Map();
  [state.current,...futureIds].forEach(id=>{
    state.months[id].debts.forEach(d=>{
      if(d.prazo>0&&d.prazoId){
        if(!instMap.has(d.prazoId)||d.prazo>instMap.get(d.prazoId).prazo)
          instMap.set(d.prazoId,{...d,monthName:state.months[id].name});
      }
    });
  });
  const insts=[...instMap.values()].sort((a,b)=>b.prazo-a.prazo);

  if(insts.length){
    const sub3=document.createElement('div');sub3.className='dash-sub';
    const totalRest=insts.reduce((s,d)=>s+d.value*d.prazo,0);
    sub3.innerHTML=`Parcelamentos ativos <span>${fmt(totalRest)} restante</span>`;
    el.appendChild(sub3);

    const iList=document.createElement('div');iList.className='inst-list';
    insts.forEach(d=>{
      const done=d.prazoOrig-d.prazo;
      const pct=Math.round(done/d.prazoOrig*100);
      const totalLeft=d.value*d.prazo;
      const row=document.createElement('div');row.className='il-row';
      row.innerHTML=`
        <div class="il-top">
          <div class="il-name"></div>
          <div class="il-val">${fmt(d.value)}<span style="font-size:10px;font-weight:500;color:var(--ink-soft)">/mês</span></div>
        </div>
        <div class="il-bar"><div class="il-barfill" data-w="${pct}"></div></div>
        <div class="il-meta">
          <span>${done} de ${d.prazoOrig} meses — <span class="il-pz">${d.prazo}x restantes</span></span>
          <span style="color:var(--debt);font-family:var(--mono);font-weight:700">${fmt(totalLeft)}</span>
        </div>`;
      row.querySelector('.il-name').textContent=d.name;
      iList.appendChild(row);
    });
    el.appendChild(iList);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      iList.querySelectorAll('.il-barfill').forEach(b=>{b.style.width=b.dataset.w+'%'});
    }));
  }
}

document.getElementById('btnDash').onclick=()=>{renderDashboard();open('ovDash')};
document.getElementById('closeDash').onclick=()=>close('ovDash');

/* ===== Prazo toggle ===== */
let prazoOpen=false;
function setPrazoOpen(v){
  prazoOpen=v;
  const wrap=document.getElementById('prazoWrap');
  const btn=document.getElementById('btnPrazoToggle');
  const label=document.getElementById('prazoToggleLabel');
  wrap.classList.toggle('open',v);
  btn.classList.toggle('open',v);
  btn.setAttribute('aria-expanded',v);
  if(!v){
    document.getElementById('fPrazo').value='';
    document.getElementById('fPrazoHint').textContent='';
    label.textContent='+ Definir prazo (parcelas)';
  }
}
document.getElementById('btnPrazoToggle').onclick=()=>{
  setPrazoOpen(!prazoOpen);
  if(prazoOpen) setTimeout(()=>document.getElementById('fPrazo').focus(),250);
};
document.getElementById('fPrazo').addEventListener('input',function(){
  const v=parseInt(this.value)||0;
  const hint=document.getElementById('fPrazoHint');
  if(v<=0){hint.textContent='';return}
  hint.textContent=`Repete por ${v} ${v===1?'mês':'meses'} e para automaticamente`;
  document.getElementById('prazoToggleLabel').textContent=`Prazo: ${v}x`;
});

/* ===== Modais ===== */
let editing=null;
const ov=id=>document.getElementById(id);
function open(id){ov(id).classList.add('open')}
function close(id){ov(id).classList.remove('open')}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')});
});
function swToggle(btn){
  btn.classList.toggle('on');
  btn.setAttribute('aria-checked',btn.classList.contains('on'));
}
document.getElementById('fRec').onclick=e=>swToggle(e.currentTarget);
document.getElementById('fCopy').onclick=e=>swToggle(e.currentTarget);

function openDebt(d){
  editing=d||null;
  document.getElementById('debtTitle').textContent=d?'Editar conta':'Nova dívida';
  document.getElementById('fName').value=d?d.name:'';
  document.getElementById('fValue').value=d?d.value:'';
  document.getElementById('fDue').value=d&&d.due?d.due:'';
  document.getElementById('fCat').value=d?d.cat:'Fixa';

  // prazo
  if(d&&d.prazoOrig>0){
    document.getElementById('fPrazo').value=d.prazoOrig;
    document.getElementById('fPrazoHint').textContent=`${d.prazo} de ${d.prazoOrig} meses restantes`;
    document.getElementById('prazoToggleLabel').textContent=`Prazo: ${d.prazoOrig}x`;
    setPrazoOpen(true);
  }else{
    setPrazoOpen(false);
  }

  const rec=document.getElementById('fRec');
  rec.classList.toggle('on',!!(d&&d.rec));
  rec.setAttribute('aria-checked',!!(d&&d.rec));
  document.getElementById('delDebt').style.display=d?'block':'none';
  open('ovDebt');
  if(!d)setTimeout(()=>document.getElementById('fName').focus(),250);
}

document.getElementById('fab').onclick=()=>openDebt(null);
document.getElementById('closeDebt').onclick=()=>close('ovDebt');

document.getElementById('saveDebt').onclick=()=>{
  const name=document.getElementById('fName').value.trim();
  const value=parseFloat(document.getElementById('fValue').value);
  if(!name||!(value>0)){toast('Preencha nome e valor');return}
  const due=parseInt(document.getElementById('fDue').value)||null;
  const cat=document.getElementById('fCat').value;
  const rec=document.getElementById('fRec').classList.contains('on');
  const prazoTotal=prazoOpen?(parseInt(document.getElementById('fPrazo').value)||0):0;

  if(editing){
    if(prazoTotal>0){
      const prevLeft=editing.prazo||0;
      editing.prazoOrig=prazoTotal;
      editing.prazo=prevLeft>0?Math.min(prevLeft,prazoTotal):prazoTotal;
      if(!editing.prazoId) editing.prazoId=uid();
    }else{
      delete editing.prazo;delete editing.prazoOrig;delete editing.prazoId;
    }
    Object.assign(editing,{name,value,due,cat,rec});
  }else{
    const d={id:uid(),name,value,due,cat,rec,paid:false};
    if(prazoTotal>0){d.prazo=prazoTotal;d.prazoOrig=prazoTotal;d.prazoId=uid()}
    cur().debts.push(d);
  }
  save();close('ovDebt');render();
  toast(editing?'Conta atualizada':'Conta adicionada');
};

document.getElementById('delDebt').onclick=()=>{
  cur().debts=cur().debts.filter(d=>d!==editing);
  save();close('ovDebt');render();toast('Conta excluída');
};

document.getElementById('btnSalary').onclick=()=>{
  document.getElementById('fSalary').value=cur().salary||'';
  open('ovSalary');
};
document.getElementById('closeSalary').onclick=()=>close('ovSalary');
document.getElementById('saveSalary').onclick=()=>{
  cur().salary=parseFloat(document.getElementById('fSalary').value)||0;
  save();close('ovSalary');render();toast('Renda salva');
};

function openMonth(){
  const now=new Date();now.setMonth(now.getMonth()+state.order.length);
  document.getElementById('fMonth').value=
    cap(now.toLocaleDateString('pt-BR',{month:'long'}))+' '+String(now.getFullYear()).slice(2);
  open('ovMonth');
}
document.getElementById('closeMonth').onclick=()=>close('ovMonth');
document.getElementById('saveMonth').onclick=()=>{
  const name=document.getElementById('fMonth').value.trim();
  if(!name){toast('Dê um nome ao mês');return}
  const copy=document.getElementById('fCopy').classList.contains('on');
  const id=uid();
  let debts=[];
  if(copy){
    cur().debts.forEach(d=>{
      if(d.prazo>0){
        if(d.prazo>1) debts.push({...d,id:uid(),paid:false,prazo:d.prazo-1,prazoOrig:d.prazoOrig,prazoId:d.prazoId});
      }else if(d.rec){
        debts.push({...d,id:uid(),paid:false});
      }
    });
  }
  state.months[id]={name,salary:cur().salary,debts};
  state.order.push(id);state.current=id;
  save();close('ovMonth');render();
  toast(copy&&debts.length?`Mês criado com ${debts.length} recorrentes`:'Mês criado');
};
document.getElementById('delMonth').onclick=()=>{
  if(state.order.length<=1){toast('Não dá para excluir o único mês');return}
  if(!confirm(`Excluir "${cur().name}" e todas as contas dele?`))return;
  delete state.months[state.current];
  state.order=state.order.filter(i=>i!==state.current);
  state.current=state.order[state.order.length-1];
  save();close('ovMonth');render();toast('Mês excluído');
};

document.getElementById('btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='caderneta-backup.json';
  a.click();URL.revokeObjectURL(a.href);toast('Backup exportado');
};

['search','filterCat','sortBy'].forEach(id=>
  document.getElementById(id).addEventListener('input',renderList));

let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

load().then(()=>{
  if(!state.current||!state.months[state.current])seed();
  render();
  if(memOnly)toast('Sem armazenamento — dados só nesta sessão');
});
</script>
</body>
